<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EduLearn</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      🎓 <span>EduLearn</span>
    </div>
    <div class="navbar-actions">
      <button class="theme-toggle" title="Toggle Dark Mode">🌙</button>
    </div>
  </nav>

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background-color: var(--bg-secondary);">
    <div class="card" style="max-width: 450px; width: 100%;">
      <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--primary-color); margin-bottom: 10px;">Welcome Back!</h1>
        <p>Sign in to your EduLearn account to continue learning</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" name="remember" style="width: 18px; height: 18px; cursor: pointer;">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" style="color: var(--primary-color);">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Sign In</button>
      </form>

      <div style="text-align: center; margin-bottom: 20px;">
        <p style="color: var(--text-secondary);">or continue with</p>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px;">
        <button class="btn btn-secondary" style="width: 100%;">
          <span style="font-size: 20px;">🔵</span>
        </button>
        <button class="btn btn-secondary" style="width: 100%;">
          <span style="font-size: 20px;">🟦</span>
        </button>
        <button class="btn btn-secondary" style="width: 100%;">
          <span style="font-size: 20px;">🔴</span>
        </button>
      </div>

      <div style="text-align: center; padding-top: 20px; border-top: 1px solid var(--border-color);">
        <p>Don't have an account? <a href="register.html" style="color: var(--primary-color); font-weight: 600;">Create one</a></p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = loginForm.querySelector('input[name="email"]').value;
      localStorage.setItem('user', JSON.stringify({ email, role: 'student' }));
      Notification.success('Login successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'student-dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
