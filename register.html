<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EduLearn</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      🎓 <span>EduLearn</span>
    </div>
    <div class="navbar-actions">
      <button class="theme-toggle" title="Toggle Dark Mode">🌙</button>
    </div>
  </nav>

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background-color: var(--bg-secondary);">
    <div class="card" style="max-width: 450px; width: 100%;">
      <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--primary-color); margin-bottom: 10px;">Create Account</h1>
        <p>Start your learning journey with EduLearn today</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="fullName" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>User Type</label>
          <select name="userType" required>
            <option value="">Select user type</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="institution">Institution</option>
          </select>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer; margin-bottom: 20px;">
          <input type="checkbox" name="terms" style="margin-top: 4px; cursor: pointer;" required>
          <span>I agree to the Terms of Service and Privacy Policy</span>
        </label>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Create Account</button>
      </form>

      <div style="text-align: center; margin-bottom: 20px;">
        <p style="color: var(--text-secondary);">or sign up with</p>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px;">
        <button type="button" class="btn btn-secondary" style="width: 100%;">
          <span style="font-size: 20px;">🔵</span>
        </button>
        <button type="button" class="btn btn-secondary" style="width: 100%;">
          <span style="font-size: 20px;">🟦</span>
        </button>
        <button type="button" class="btn btn-secondary" style="width: 100%;">
          <span style="font-size: 20px;">🔴</span>
        </button>
      </div>

      <div style="text-align: center; padding-top: 20px; border-top: 1px solid var(--border-color);">
        <p>Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const registerForm = document.getElementById('registerForm');
    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const password = registerForm.querySelector('input[name="password"]').value;
      const confirmPassword = registerForm.querySelector('input[name="confirmPassword"]').value;
      
      if (password !== confirmPassword) {
        Notification.error('Passwords do not match!');
        return;
      }
      
      const email = registerForm.querySelector('input[name="email"]').value;
      const userType = registerForm.querySelector('select[name="userType"]').value;
      
      localStorage.setItem('user', JSON.stringify({ email, userType }));
      Notification.success('Account created successfully! Redirecting...');
      setTimeout(() => {
        if (userType === 'teacher') {
          window.location.href = 'teacher-dashboard.html';
        } else {
          window.location.href = 'student-dashboard.html';
        }
      }, 1500);
    });
  </script>
</body>
</html>
