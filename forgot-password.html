<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - EduLearn</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      🎓 <span>EduLearn</span>
    </div>
    <div class="navbar-actions">
      <button class="theme-toggle" title="Toggle Dark Mode">🌙</button>
    </div>
  </nav>

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background-color: var(--bg-secondary);">
    <div class="card" style="max-width: 450px; width: 100%;">
      <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--primary-color); margin-bottom: 10px;">Reset Password</h1>
        <p>Enter your email address and we'll send you instructions to reset your password</p>
      </div>

      <form id="forgotForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Send Reset Link</button>
      </form>

      <div style="text-align: center; padding-top: 20px; border-top: 1px solid var(--border-color);">
        <p>Remember your password? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Sign in</a></p>
      </div>

      <!-- Success Message -->
      <div id="successMessage" style="display: none; margin-top: 25px; padding: 20px; background-color: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--success-color); border-radius: 8px;">
        <div style="font-weight: 600; color: var(--success-color); margin-bottom: 8px;">✓ Email Sent!</div>
        <p style="margin: 0; font-size: 14px;">Check your email for password reset instructions. The link will expire in 1 hour.</p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const forgotForm = document.getElementById('forgotForm');
    const successMessage = document.getElementById('successMessage');

    forgotForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      forgotForm.style.display = 'none';
      successMessage.style.display = 'block';
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);
    });
  </script>
</body>
</html>
